name: Playwright Tests

on:
  workflow_dispatch:

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '22'

      # Устанавливаем Gradle через gradle/actions/setup-gradle
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@af1da67850ed9a4cedd57bfd976089dd991e2582 # v4.0.0

      # Предоставляем права на выполнение скрипта gradlew
      - name: Grant execute permission for Gradle
        run: chmod +x gradlew

      # Устанавливаем Playwright браузеры
      - name: Install Playwright browsers
        run: npx playwright install --with-deps
        # Если вы хотите использовать Gradle для установки, можно попробовать:
        # run: ./gradlew playwright:install

      # Запускаем ТОЛЬКО тесты из класса PlaywrightTestsV2
      - name: Run PlaywrightTestsV2
        run: ./gradlew test --tests "tests.playwrightV2.PlaywrightTestsV2"

            # Опционально: сохраняем Allure-результаты
      - name: Archive Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-results-playwright
          path: build/allure-results

      # Устанавливаем Allure CLI через npm
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Allure CLI
        run: |
          npm install -g allure-commandline@latest
          allure --version

      # Генерируем отчёт Allure
      - name: Generate Allure Report
        run: |
          allure generate ./build/allure-results --clean -o ./allure-report

      # Публикуем отчёт как артефакт
      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-report/
